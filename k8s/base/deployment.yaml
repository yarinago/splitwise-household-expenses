apiVersion: apps/v1
kind: Deployment
metadata:
  name: splitwise-export
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: splitwise-export
  template:
    metadata:
      labels:
        app.kubernetes.io/name: splitwise-export
    spec:
      containers:
        - name: web
          image: ghcr.io/REPLACE_ME/splitwise-household-expenses:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SPLITWISE_LOAD_DOTENV
              value: "0"
            - name: EXPORT_VERSION
              value: latest
          envFrom:
            - configMapRef:
                name: splitwise-export-config
            - secretRef:
                name: splitwise-export-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
